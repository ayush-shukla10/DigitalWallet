<!DOCTYPE html>
<html>
<head>
  <title>Digital Wallet</title>
 <style>
  body {
    font-family: 'Segoe UI';
    background: #f5f7fb;
    text-align: center;
    margin-top: 80px;
  }

  input, button {
    padding: 10px;
    margin: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  button {
    width: 300px;
    background: #2d8cff;
    color: white;
    border: none;
  }

  button:hover {
    background: #1c6ed5;
  }
  .input-box {
    width: 300px;
    margin: 12px auto;
    position: relative;
}
.input-box input {
    width: 100%;
    padding: 10px 45px 10px 10px;  
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;  
}
.eye-icon {
    position: absolute;
    right: 12px;      
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 16px;
}

  .hidden {
  display: none;
}
</style>
</head>

<body>

<h2>Digital Wallet</h2>

<button onclick="showLogin()">Login</button>
<button onclick="showRegister()">Register</button>

<div id="loginBox">
  <h3>Login</h3>

  <div class="input-box">
    <input id="loginEmail" placeholder="Email">
  </div>

  <div class="input-box" style="position: relative;">
    <input type="password" id="loginPassword" placeholder="Password">

    <span onclick="togglePassword('loginPassword', this)" class="eye-icon">
      👁️
    </span>
  </div>

  <button onclick="login()">Login</button>
</div>

<div id="registerBox" class="hidden">
  <h3>Register</h3>

  <div class="input-box">
    <input id="name" placeholder="Name">
  </div>

  <div class="input-box">
    <input id="email" placeholder="Email">
  </div>

  <div class="input-box" style="position: relative;">
    <input type="password" id="password" placeholder="Password">

    <span onclick="togglePassword('password', this)" class="eye-icon">
      👁️
    </span>
  </div>

  <button onclick="register()">Register</button>
</div>

<p id="msg"></p>

<script src="script.js"></script>
</body>
</html>
